body:
  text: 後漢安息國三藏安世高譯聞如是一時諸上尊比丘在波羅梨弗都盧城雞園中世尊般涅槃不久於是十支居士八城人多有財物詣波羅梨弗都盧治生於是十支居士八城人持錢財物盡買盡買已極歡喜得盈利極大歡喜意極悅豫出波羅梨弗都盧城已至雞園中到已禮諸上尊比丘足却坐一面彼十支居士八城人却坐一面時諸上尊比丘為說法勸進等勸進教授等教授以無量方便為說法勸進至等教授等令歡喜已默然住於是彼十支居士及八城人聞諸上尊比丘所說法勸進至等歡喜已白諸上尊比丘曰此諸上尊今尊者阿難在何所住我今欲見此居士彼尊者阿難在毗舍離獼猴水岸上欲見者當往見之於是十支居士八城人從坐起禮諸上尊比丘足繞諸上尊已離諸上尊還至彼尊者阿難所到已禮尊者阿難足已却坐一面彼十支居士八城人却住一面已白尊者阿難曰此阿難我欲有所問聽我所問當問居士聞已知之此尊者阿難彼世尊有智有見如來無所著等正覺以眼見第一義說一法聖弟子所住於有餘處有漏盡意解脫不此居士彼世尊有智有見如來無所著等正覺以眼見第一義說一法聖弟子所住有餘處有漏盡意解脫云何尊者阿難彼如來無所著等正覺眼見第一義說一法聖弟子所住有餘處有漏盡意解脫此居士聖弟子所聞於淫解脫至住四禪正受住彼依入法法相觀行止彼依入法法相觀行止住可有是處彼所住得有漏盡不住彼處得有漏盡彼自樂法彼自愛法彼自習法彼自敬法得歡喜五下結盡得化生彼般涅槃成阿那含不還此世間是為居士彼世尊有智有見如來無所著等正覺眼見第一義說一法聖弟子所住有餘處有漏盡意解脫復次居士聖弟子所聞意與慈俱滿一方已正受住如是二三四上下一切諸方意與慈俱無怨無二無恚極廣極大無量極分別滿諸方已正受住如是意與悲喜護俱滿一切諸方已正受住彼依入法法相觀行止彼依入法法相觀行止住可有是處住彼已得有漏盡不住彼處得有漏盡若彼以法樂以法愛習行法敬法得歡喜法五下結盡得化生於彼處般涅槃成阿那含不還此世間是為居士彼世尊有智有見如來無所著等正覺眼見第一義說第一法聖弟子所住有餘處有漏盡意解脫復次居士聖弟子所聞度一切色相至有想無想處正受住彼依入法法相觀行止至有漏盡意解脫於是十支居士八城人白尊者阿難曰甚奇尊者阿難我等問尊者阿難一甘露門而為說十二甘露門甚多尊者阿難於此十二甘露門依各各甘露門當安隱自御之猶若尊者阿難離城村不遠有重閣若重閣房邊有十二門或有人入中少有所為或有人生無有義不饒益不安隱不快樂或有以火燒重閣此尊者阿難彼人於十二門隨彼意安隱出如是甚奇尊者阿難我等問尊者阿難一甘露門而為說十二甘露門此尊者阿難為甚多當於十二甘露門依各各甘露門各各當出之此尊者阿難彼諸婆羅門與惡法俱施與師物況當我等今於大師當不以財施之於是十支居士八城人於其夜饌具淨妙飲食於其夜饌具淨妙飲食已隨時敷座敷座已請雞園中比丘僧毗舍離比丘僧皆悉聚之雞園中諸比丘僧毗舍離諸比丘僧皆悉聚已以淨妙飲食手自授與以淨妙飲食手授與已知食訖收攝鉢器行澡水以五百種物買房施與尊者阿難以為私有彼尊者阿難施與招提僧阿難如是說十支居士八城人聞尊者阿難所說歡喜而樂
